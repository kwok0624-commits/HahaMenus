<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>雞翼</title><style>body{margin:0;font-family:system-ui,-apple-system,"PingFang HK","Microsoft JhengHei",sans-serif;background:#f7efe4;color:#2b2b2b}.wrap{max-width:900px;margin:0 auto;padding:24px 16px 56px}.back{display:inline-block;margin-bottom:16px;color:#8a5a2b;text-decoration:none}.card{background:#fff;border:1px solid #e3d7c8;border-radius:22px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.05)}h1{margin:0 0 10px;font-size:36px}p{margin:0;color:#635b52;line-height:1.7}h2{margin:18px 0 10px;font-size:28px}ul{margin:0;padding-left:24px;line-height:1.8}</style></head><body><div class="wrap"><a class="back" href="2-recipe-lemon-tea-chicken-wings.html">← 返回食譜頁</a><div class="card"><h1>雞翼</h1><p>雞翼係常見家常食材，適合煎、焗、蒸、燜同炸；今次呢個版本會用喺檸檬茶雞翼做主角。</p><h2>營養價值（每100g）</h2><ul><li>能量：約 203 kcal。</li><li>蛋白質：約 30 g。</li><li>脂肪：約 9 g。</li></ul><h2>常見作用</h2><ul><li>適合做主菜或小食。</li><li>容易吸味，適合醃製。</li></ul><h2>飲食提示</h2><ul><li>雞翼皮脂肪較高，想清淡可減少用油。</li><li>要徹底煮熟，避免中心未熟透。</li></ul></div></div></body></html>
