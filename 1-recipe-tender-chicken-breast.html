<h1>蒸／焗嫩雞胸</h1>
<p>高蛋白、簡單易做，適合做輕盈主菜。</p>
<img src="images/1-tender-chicken-breast-v1.png" alt="蒸／焗嫩雞胸成品圖">
<h2>材料</h2>
<ul><li><a href="1-ingredient-chicken-breast-v1.html">雞胸肉</a> 1–2 塊。</li><li>薑絲 少許。</li><li>鹽、黑椒、少少油。</li><li>可選：生粉、蜜糖芥末、沙律菜。</li></ul>
<h2>做法</h2>
<ol><li>雞胸解凍／回溫後抹乾。</li><li>用 300ml 水加 15g 鹽浸 30–45 分鐘。</li><li>沖一沖表面，再徹底印乾。</li><li>薄薄拍一層生粉，再加少少油。</li><li>蒸法：100°C 蒸焗爐蒸 8–12 分鐘；焗法：先煎香表面，再以 190°C 焗至熟。</li><li>完成後靜置 5 分鐘，再切片上碟，配薑絲、黑椒或沙律。</li></ol>
