<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>蒸／焗嫩雞胸</title></head><body><a href="index-v2.html">← 返回目錄</a><h1>蒸／焗嫩雞胸</h1><p>高蛋白、簡單易做，適合做輕盈主菜。</p><img src="images/1-tender-chicken-breast-v2.png" alt="蒸／焗嫩雞胸成品圖" style="max-width:100%;height:auto;display:block;"><h2>材料</h2><ul><li><a href="1-ingredient-chicken-breast-v2.html">雞胸肉</a> 1–2 塊。</li><li>薑絲 少許。</li><li>鹽、黑椒、少少油。</li></ul><h2>做法</h2><ol><li>雞胸解凍／回溫後抹乾。</li><li>用 300ml 水加 15g 鹽浸 30–45 分鐘。</li><li>沖一沖表面，再徹底印乾。</li></ol></body></html>
