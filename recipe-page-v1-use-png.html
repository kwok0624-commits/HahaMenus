<h1>蒸／焗嫩雞胸</h1>
<div id="recipe-tender-chicken-breast">
<p>高蛋白、簡單易做，適合做輕盈主菜。</p>
<img src="images/tender-chicken-breast-v1.png" alt="蒸／焗嫩雞胸 成品圖">
<h2>材料</h2>
<ul><li>雞胸肉 1–2 塊</li><li>薑絲 少許</li></ul>
<h2>做法</h2>
<ol><li>雞胸解凍／回溫後抹乾。</li><li>蒸 8–12 分鐘。</li></ol>
