<body><div class="wrap"><a class="back" href="1-recipe-tender-chicken-breast.html">← 返回食譜頁</a><div class="card"><h1>雞胸肉</h1><p>雞胸肉係常見高蛋白食材，味道清淡，容易配搭唔同調味同煮法，適合做家常小菜、沙律、三文治同健身餐。</p><h2>營養價值（每100g）</h2><ul><li>能量：約 165 kcal。</li><li>蛋白質：約 31 g。</li><li>脂肪：約 3.6 g。</li><li>碳水化合物：0 g。</li></ul><h2>常見作用</h2><ul><li>幫助補充蛋白質。</li><li>適合作為較低脂主菜選擇。</li><li>配搭彈性高，容易加入日常餐單。</li></ul><h2>飲食提示</h2><ul><li>避免煮太耐，否則容易變乾。</li><li>醃鹽水或靜置處理可改善嫩度。</li></ul></div></div></body></html>
