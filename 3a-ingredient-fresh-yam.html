<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>鮮淮山</title><style>body{margin:0;font-family:system-ui,-apple-system,"PingFang HK","Microsoft JhengHei",sans-serif;background:#f7efe4;color:#2b2b2b}.wrap{max-width:900px;margin:0 auto;padding:24px 16px 56px}.back{display:inline-block;margin-bottom:16px;color:#8a5a2b;text-decoration:none}.card{background:#fff;border:1px solid #e3d7c8;border-radius:22px;padding:18px;box-shadow:0 8px 24px rgba(0,0,0,.05)}h1{margin:0 0 10px;font-size:34px}p{margin:0;color:#635b52;line-height:1.7}h2{margin:18px 0 10px;font-size:26px}ul{margin:0;padding-left:24px;line-height:1.8}</style></head><body><div class="wrap"><a class="back" href="3-recipe-fresh-yam-corn-carrot-soup.html">← 返回食譜頁</a><div class="card"><h1>鮮淮山</h1><p>鮮淮山富含澱粉、膳食纖維與多種植物營養素，適合煲湯，口感清甜。</p><h2>營養資料</h2><p>每100g約含熱量 70 kcal、碳水化合物 15-16g、膳食纖維約 2g。</p><h2>食療功效</h2><p>常作為健脾開胃、補氣養陰的家常食材；有助增加湯水黏滑口感。</p></div></div></body></html>
